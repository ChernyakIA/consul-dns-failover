apiVersion: apps/v1
kind: Deployment
metadata:
  name: dns-manager-selectel
  namespace: <FILL_THIS_FIELD>
  labels:
    app: dns-manager-selectel
    app.kubernetes.io/name: dns-manager-selectel
spec:
  selector:
    matchLabels:
      app: dns-manager-selectel
  replicas: 1
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: dns-manager-selectel
        app.kubernetes.io/name: dns-manager-selectel
        app.kubernetes.io/part-of: dns-failover
        app.kubernetes.io/component: dns-manager
    spec:
      securityContext:
        runAsUser: 100
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: consul-template
        image: <FILL_THIS_FIELD>
        args: ["-config=/etc/consul-template/config.hcl"]
        env:
        - name: DNS_PROVIDER_NAME
          value: "selecteldns"
          
        - name: CONSUL_GC_PATH
          valueFrom:
            configMapKeyRef:
              name: consul-template-config
              key: CONSUL_GC_PATH
        - name: CONSUL_HTTP_ADDR
          valueFrom:
            configMapKeyRef:
              name: consul-template-config
              key: CONSUL_HTTP_ADDR
        - name: SERVICE_NAME_REGEX
          valueFrom:
            configMapKeyRef:
              name: consul-template-config
              key: SERVICE_NAME_REGEX
        - name: SEL_ACCOUNT_ID
          valueFrom:
            secretKeyRef:
              name: dns-manager-selectel-secrets
              key: SEL_ACCOUNT_ID
        - name: SEL_SERVICE_USER
          valueFrom:
            secretKeyRef:
              name: dns-manager-selectel-secrets
              key: SEL_SERVICE_USER
        - name: SEL_SERVICE_PASS
          valueFrom:
            secretKeyRef:
              name: dns-manager-selectel-secrets
              key: SEL_SERVICE_PASS
        - name: SEL_PROJECT_NAME
          valueFrom:
            secretKeyRef:
              name: dns-manager-selectel-secrets
              key: SEL_PROJECT_NAME
        resources:
          requests:
            cpu: 100m
            memory: 100Mi
          limits:
            cpu: 200m
            memory: 500M
        volumeMounts:
        - name: consul-template-config
          mountPath: /etc/consul-template/config.hcl
          subPath: config.hcl
        - name: consul-template-config
          mountPath: /home/consul-template/template-service.tpl
          subPath: template-service.tpl
        - name: consul-template-config
          mountPath: /home/consul-template/main.py
          subPath: dns-failover-manager-selectel.py
      restartPolicy: Always
      volumes:
      - name: consul-template-config
        configMap:
          name: consul-template-config
          